name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Verify gofmt
        run: |
          out=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go mod tidy check
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum 2>/dev/null; then
            echo "go.mod/go.sum out of date"
            git diff
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m

      - name: test
        run: go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...

      - name: coverage summary
        run: go tool cover -func=coverage.txt | tail -1

  build:
    name: build binaries
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: build all commands
        run: |
          mkdir -p bin
          for cmd in curator api-gateway audit-writer ingest-mysql synth-source; do
            go build -o bin/fluxlens-${cmd} ./cmd/${cmd}
          done

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7
