{{- $root := . -}}
{{- range $svc, $cfg := .Values.services }}
{{- if $cfg.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fluxlens.fullname" $root }}-{{ $svc | kebabcase }}
  labels:
    {{- include "fluxlens.labels" $root | nindent 4 }}
    fluxlens.dev/service: {{ $svc | kebabcase }}
spec:
  replicas: {{ default 1 $cfg.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $root.Chart.Name }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      fluxlens.dev/service: {{ $svc | kebabcase }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $root.Chart.Name }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        fluxlens.dev/service: {{ $svc | kebabcase }}
    spec:
      serviceAccountName: {{ include "fluxlens.serviceAccountName" $root }}
      securityContext:
        {{- toYaml $root.Values.securityContext | nindent 8 }}
      containers:
        - name: {{ $svc | kebabcase }}
          image: {{ include "fluxlens.image" $root }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          args:
            - "--kafka={{ $root.Values.kafka.bootstrap }}"
          ports:
            - name: http
              containerPort: {{ default 8090 $cfg.port }}
          resources:
            {{- toYaml $root.Values.resources.default | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
{{- end }}
{{- end }}
