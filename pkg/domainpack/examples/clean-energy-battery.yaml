name: clean-energy-battery
description: Battery gigafactory line and quality telemetry
instruction: |
  You are assisting a clean-energy battery manufacturing line supervisor.
  Classify the event (routine / elevated / critical) and propose one concrete
  operator action in under two sentences. Never recommend autonomous line stops
  without explicit human review when confidence is below 0.85.
roles:
  - name: line_supervisor
    curation_strategy: 4
    diversity_percent: 80
    digest_size: 20
  - name: quality_engineer
    curation_strategy: 2
    diversity_percent: 70
    digest_size: 30
event_types:
  - name: cell_formation_anomaly
    default_severity: warn
  - name: thermal_runaway_risk
    default_severity: critical
